name: uniwheels

# ═══════════════════════════════════════════════════════════════════════════════
#  NETWORK SEGMENTATION + ModSecurity en Reverse Proxies  (Opción B)
#
#  Five isolated zones — only the edge zone is reachable from the host.
#
#  ┌──────────────────────────────────────────────────────────────────────────┐
#  │  EDGE      (public)   rp-web :8080──┐   rp-mobile :8081──┐              │
#  │  WEB-ZONE  (internal) rp-web ←─→ frontend (Next.js SSR)                 │
#  │  GATEWAY   (internal) rp-web ←─→ api-gateway  rp-mobile ←─→ api-gateway │
#  │  SERVICES  (internal) api-gateway ←─→ microservices                     │
#  │  DATA      (internal) microservices ←─→ databases + broker               │
#  └──────────────────────────────────────────────────────────────────────────┘
#
#  Rules enforced by the topology below:
#   • rp-web (:8080) y rp-mobile (:8081) son los ÚNICOS con host port bindings.
#   • Cada RP embebe ModSecurity + OWASP CRS (Paranoia 1): WAF en el edge.
#   • Rate limiting diferenciado por canal (web vs mobile) y por endpoint.
#   • frontend y api-gateway son PRIVADOS — los clientes nunca los ven directamente.
#   • Cada microservicio solo alcanza las bases de datos que le pertenecen.
# ═══════════════════════════════════════════════════════════════════════════════

networks:

  # Zone 1 – EDGE: única zona con acceso al host (rp-web :8080, rp-mobile :8081)
  edge:
    driver: bridge
    name: uniwheels-edge

  # Zone 2 – WEB-ZONE: rp-web ↔ Next.js SSR (privada)
  web-zone:
    driver: bridge
    name: uniwheels-web-zone
    internal: true

  # Zone 3 – GATEWAY-ZONE: rp-web + rp-mobile + SSR ↔ api-gateway (privada)
  gateway-zone:
    driver: bridge
    name: uniwheels-gateway-zone
    internal: true

  # Zone 4 – SERVICES: api-gateway ↔ microservices (privada)
  services:
    driver: bridge
    name: uniwheels-services
    internal: true

  # Zone 5 – DATA: microservices ↔ databases + broker (privada)
  data:
    driver: bridge
    name: uniwheels-data
    internal: true

services:

  # ─────────────────────────────────────────────────────────────────────────────
  #  INFRAESTRUCTURA (bases de datos + broker)  →  DATA zone only
  # ─────────────────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: auth-db
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-loggeo_base_db}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    # No host port – reachable only within the data network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-loggeo_base_db}"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  mongo-chat:
    image: mongo:7
    container_name: chat-db
    # No host port – reachable only within the data network
    volumes:
      - mongo_chat_data:/data/db
    networks:
      - data
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    restart: unless-stopped

  mongo-notifications:
    image: mongo:7
    container_name: notifications-db
    # No host port – reachable only within the data network
    volumes:
      - mongo_notifications_data:/data/db
    networks:
      - data
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    restart: unless-stopped

  mongo-routes:
    image: mongo:7
    container_name: routes-db
    # No host port – reachable only within the data network
    volumes:
      - mongo_routes_data:/data/db
    networks:
      - data
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    restart: unless-stopped

  search-postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: route-search-postgres
    environment:
      POSTGRES_DB:       routesearch
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    # No host port – reachable only within the data network
    volumes:
      - route_search_pgdata:/var/lib/postgresql/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: event-broker
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit heartbeat 60"
    # No host ports – broker is internal; management UI not exposed to host
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - data
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  #  MICROSERVICIOS DE NEGOCIO  →  SERVICES zone + DATA zone
  # ─────────────────────────────────────────────────────────────────────────────

  loggueo-service:
    build:
      context: ../loggueo_service
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      DATABASE_URL:                postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-loggeo_base_db}
      SECRET_KEY:                  ${JWT_SHARED_SECRET:-dev_secret_change_me}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      ALGORITHM:                   ${JWT_ALGORITHM:-HS256}
      DEBUG:                       ${AUTH_DEBUG:-False}
      ENVIRONMENT:                 ${AUTH_ENVIRONMENT:-production}
    # No host port – reachable only via api-gateway on the services network
    networks:
      - services
      - data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/').getcode()==200 else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    restart: unless-stopped

  chat-service:
    build:
      context: ../chat-service
      dockerfile: Dockerfile
    container_name: chat-service
    environment:
      NODE_ENV:          production
      PORT:              3001
      MONGODB_URI:       mongodb://mongo-chat:27017/uniwheels_chat
      JWT_ACCESS_SECRET: ${JWT_SHARED_SECRET:-dev_secret_change_me}
      CORS_ORIGIN:       ${FRONTEND_URL:-http://localhost:8080}
      API_GATEWAY_URL:   http://api-gateway:8080
      RABBITMQ_URL:      amqp://admin:admin@rabbitmq:5672?heartbeat=60
    # No host port – reachable only via api-gateway on the services network
    networks:
      - services
      - data
    depends_on:
      mongo-chat:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3001/health',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    restart: unless-stopped

  notifications-service:
    build:
      context: ../notifications-service
      dockerfile: Dockerfile
    container_name: notifications-service
    environment:
      NODE_ENV:          production
      PORT:              3002
      MONGODB_URI:       mongodb://mongo-notifications:27017/uniwheels_notifications
      JWT_ACCESS_SECRET: ${JWT_SHARED_SECRET:-dev_secret_change_me}
      RABBITMQ_URL:      amqp://admin:admin@rabbitmq:5672?heartbeat=60
      CORS_ORIGIN:       ${FRONTEND_URL:-http://localhost:8080}
    # No host port – reachable only via api-gateway on the services network
    networks:
      - services
      - data
    depends_on:
      mongo-notifications:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3002/health',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  routes-reservations-service:
    build:
      context: ../routes-reservations-service
      dockerfile: Dockerfile
    container_name: routes-service
    environment:
      PORT:         4000
      MONGO_URI:    mongodb://mongo-routes:27017/routesdb
      JWT_SECRET:   ${JWT_SHARED_SECRET:-dev_secret_change_me}
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672?heartbeat=60
    # No host port – reachable only via api-gateway on the services network
    networks:
      - services
      - data
    depends_on:
      mongo-routes:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/health',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  search-service:
    build:
      context: ../search-service
      dockerfile: Dockerfile
    container_name: route-search-service
    environment:
      PORT: 6000
      DATABASE_URL: postgresql://postgres:postgres@search-postgres:5432/routesearch?sslmode=disable
      ROUTES_SERVICE_URL: http://routes-reservations-service:4000
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-60}
      JWT_SECRET: ${JWT_SHARED_SECRET:-dev_secret_change_me}
    # No host port – reachable only via api-gateway on the services network
    networks:
      - services
      - data
    depends_on:
      search-postgres:
        condition: service_healthy
      routes-reservations-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  #  API GATEWAY  →  GATEWAY-ZONE + SERVICES (private — no host port)
  # ─────────────────────────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    environment:
      PORT:                      8080
      JWT_SECRET:                ${JWT_SHARED_SECRET:-dev_secret_change_me}
      AUTH_SERVICE_URL:          http://loggueo-service:8000
      CHAT_SERVICE_URL:          http://chat-service:3001
      ROUTES_SERVICE_URL:        http://routes-reservations-service:4000
      NOTIFICATIONS_SERVICE_URL: http://notifications-service:3002
      SEARCH_SERVICE_URL:        http://route-search-service:6000
      COOKIE_MAX_AGE:            ${COOKIE_MAX_AGE:-1800}
      FRONTEND_URL:              ${FRONTEND_URL:-http://localhost:8080}
    # No host port – reachable only via rp-mobile (mobile) or SSR rewrites (web)
    networks:
      - gateway-zone
      - services
    depends_on:
      loggueo-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      routes-reservations-service:
        condition: service_healthy
      notifications-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:8080/health',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  #  FRONTEND (Next.js SSR)  →  WEB-ZONE + GATEWAY-ZONE (private — no host port)
  # ─────────────────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: .
      dockerfile: dockerfile
      args:
        # Public URL of rp-web (what the browser sees).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        # Internal URL for SSR rewrites to reach the API Gateway.
        # MUST be a build arg because next.config.ts evaluates rewrites() at build time.
        INTERNAL_GATEWAY_URL: http://api-gateway:8080
    container_name: web-app
    environment:
      PORT:     3000
      HOSTNAME: 0.0.0.0
      INTERNAL_GATEWAY_URL: http://api-gateway:8080
    # No host port – reachable only via rp-web on the web-zone network.
    networks:
      - web-zone
      - gateway-zone
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000',(res)=>process.exit(res.statusCode<500?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  #  REVERSE PROXIES con ModSecurity embebido  →  EDGE zone (únicos componentes
  #  públicos). Cada RP usa la imagen owasp/modsecurity-crs:nginx que incluye
  #  Nginx + ModSecurity + OWASP CRS compilados.  El nginx.conf de cada RP se
  #  monta en conf.d/ — el bloque http{} y la activación de ModSecurity los
  #  provee la imagen base; conf.d/ contiene los upstream, map, limit_req y server.
  # ─────────────────────────────────────────────────────────────────────────────

  rp-web:
    image: owasp/modsecurity-crs:nginx
    container_name: rp-web
    ports:
      - "8080:443"  # Tráfico HTTPS (TLS terminación) → frontend SSR
      # :80 NO se expone al host — sólo se usa internamente para el healthcheck
      # y para redirigir 301 → HTTPS si alguien dentro de la red probara HTTP.
    volumes:
      # Server blocks (http-level): upstream, map, rate limits, server{}
      - ../security/reverse-proxies/rp-web/nginx.conf:/etc/nginx/templates/conf.d/default.conf.template:ro
      # Certificados TLS generados con mkcert (CA local confiada por el OS host)
      - ../security/reverse-proxies/certs:/etc/nginx/certs:ro
      # CRS exclusion rules compartidas con el WAF anterior
      - ../WAF/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:/etc/modsecurity.d/owasp-crs/rules/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:ro
      - ../WAF/RESPONSE-999-EXCLUSION-RULES-AFTER-CRS.conf:/etc/modsecurity.d/owasp-crs/rules/RESPONSE-999-EXCLUSION-RULES-AFTER-CRS.conf:ro
    environment:
      # ── ModSecurity engine ────────────────────────────────────────────────────
      MODSEC_RULE_ENGINE:       "On"           # Modo bloqueo (no solo detección)
      MODSEC_REQ_BODY_ACCESS:   "On"           # Inspeccionar cuerpos de request
      MODSEC_RESP_BODY_ACCESS:  "Off"          # No escanear respuestas (performance)
      MODSEC_REQ_BODY_LIMIT:    "10485760"     # 10 MB — permite subida de avatares
      MODSEC_AUDIT_ENGINE:      "RelevantOnly" # Log solo peticiones bloqueadas/marcadas
      MODSEC_AUDIT_LOG_FORMAT:  "JSON"         # Log estructurado
      MODSEC_AUDIT_LOG:         "/dev/stdout"  # Stream a Docker logs
      # ── OWASP CRS tuning ─────────────────────────────────────────────────────
      BLOCKING_PARANOIA:        "1"
      DETECTION_PARANOIA:       "1"
      ANOMALY_INBOUND:          "5"
      ANOMALY_OUTBOUND:         "4"
      MANUAL_MODE:              "1"            # Usa crs-setup.conf de la imagen
      # ── Métodos y tipos de contenido permitidos ───────────────────────────────
      ALLOWED_METHODS:          "GET|HEAD|POST|PUT|PATCH|DELETE|OPTIONS"
      ALLOWED_REQUEST_CONTENT_TYPE: "application/json|application/x-www-form-urlencoded|multipart/form-data|multipart/related|text/plain"
      # ── Real-IP (la IP del cliente llega directo, no hay proxy previo) ────────
      SET_REAL_IP_FROM:         "172.16.0.0/12"
      REAL_IP_HEADER:           "X-Forwarded-For"
      SERVER_TOKENS:            "off"
    networks:
      - edge         # Público: recibe tráfico del host en :8080
      - web-zone     # rp-web → frontend SSR
      - gateway-zone # rp-web → api-gateway (bypass WebSocket de Socket.io)
    depends_on:
      frontend:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  rp-mobile:
    image: owasp/modsecurity-crs:nginx
    container_name: rp-mobile
    ports:
      - "8081:443"  # Tráfico HTTPS (TLS terminación) → api-gateway
      # :80 NO se expone — interno para healthcheck y redirect 301 → HTTPS.
    volumes:
      # Server blocks (http-level): upstream, map, rate limits, server{}
      - ../security/reverse-proxies/rp-mobile/nginx.conf:/etc/nginx/templates/conf.d/default.conf.template:ro
      # Certificados TLS generados con mkcert
      - ../security/reverse-proxies/certs:/etc/nginx/certs:ro
      # CRS exclusion rules compartidas
      - ../WAF/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:/etc/modsecurity.d/owasp-crs/rules/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:ro
      - ../WAF/RESPONSE-999-EXCLUSION-RULES-AFTER-CRS.conf:/etc/modsecurity.d/owasp-crs/rules/RESPONSE-999-EXCLUSION-RULES-AFTER-CRS.conf:ro
    environment:
      # ── ModSecurity engine ────────────────────────────────────────────────────
      MODSEC_RULE_ENGINE:       "On"
      MODSEC_REQ_BODY_ACCESS:   "On"
      MODSEC_RESP_BODY_ACCESS:  "Off"
      MODSEC_REQ_BODY_LIMIT:    "5242880"      # 5 MB — mobile es API pura, no archivos
      MODSEC_AUDIT_ENGINE:      "RelevantOnly"
      MODSEC_AUDIT_LOG_FORMAT:  "JSON"
      MODSEC_AUDIT_LOG:         "/dev/stdout"
      # ── OWASP CRS tuning ─────────────────────────────────────────────────────
      BLOCKING_PARANOIA:        "1"
      DETECTION_PARANOIA:       "1"
      ANOMALY_INBOUND:          "5"
      ANOMALY_OUTBOUND:         "4"
      MANUAL_MODE:              "1"
      # ── Mobile es JSON-only: Content-Type más estricto ────────────────────────
      ALLOWED_METHODS:          "GET|HEAD|POST|PUT|PATCH|DELETE|OPTIONS"
      ALLOWED_REQUEST_CONTENT_TYPE: "application/json"
      # ── Real-IP ───────────────────────────────────────────────────────────────
      SET_REAL_IP_FROM:         "172.16.0.0/12"
      REAL_IP_HEADER:           "X-Forwarded-For"
      SERVER_TOKENS:            "off"
    networks:
      - edge         # Público: recibe tráfico del host en :8081
      - gateway-zone # rp-mobile → api-gateway
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  healthmon:
    image: node:18-alpine
    container_name: health-monitor
    working_dir: /app
    command: node monitor.js
    volumes:
      - ./healthmon/monitor.js:/app/monitor.js:ro
    environment:
      CHECK_INTERVAL_MS: "15000"
      FAIL_THRESHOLD: "3"
      PORT: "9090"
      SERVICES: |
        loggueo-service=http://loggueo-service:8000/
        chat-service=http://chat-service:3001/health
        routes-service=http://routes-reservations-service:4000/health
        notifications-service=http://notifications-service:3002/health
        search-service=http://route-search-service:6000/health
    networks:
      - services
    depends_on:
      loggueo-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      routes-reservations-service:
        condition: service_healthy
      notifications-service:
        condition: service_healthy
      search-service:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_chat_data:
  mongo_notifications_data:
  mongo_routes_data:
  rabbitmq_data:
  route_search_pgdata:
