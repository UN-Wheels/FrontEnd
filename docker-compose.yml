version: "3.9"

services:
  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - JWT_SECRET=super_secret
      - AUTH_SERVICE_URL=http://auth-service:8000
      - CHAT_SERVICE_URL=http://chat-service:3001
      - ROUTES_SERVICE_URL=http://routes-service:4000
      - FRONTEND_URL=http://localhost:5173
      - COOKIE_MAX_AGE=1800
    depends_on:
      - auth-service

  auth-service:
    build: ./auth-service
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/loggeo_base_db
      - SECRET_KEY=super_secret_key_change_me
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - ALGORITHM=HS256
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=loggeo_base_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d loggeo_base_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: