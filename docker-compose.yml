name: uniwheels

# ═══════════════════════════════════════════════════════════════════════════════
#  NETWORK SEGMENTATION PATTERN
#
#  Three isolated zones enforce the principle of least-privilege connectivity:
#
#  ┌──────────────────────────────────────────────────────────────────────────┐
#  │  DMZ  (public)          frontend  ←→  api-gateway                       │
#  │  SERVICES  (internal)   api-gateway  ←→  microservices                  │
#  │  DATA  (internal)       microservices  ←→  databases + broker            │
#  └──────────────────────────────────────────────────────────────────────────┘
#
#  Rules:
#   • Frontend has NO route to microservices or databases — only to api-gateway.
#   • Databases are NOT reachable from the host (no host port bindings).
#   • Internal microservices are NOT reachable from the host.
#   • Only the DMZ zone (frontend:3000, api-gateway:8080) is host-accessible.
# ═══════════════════════════════════════════════════════════════════════════════

networks:

  # Zone 1 – DMZ: public-facing entry points only
  dmz:
    driver: bridge
    name: uniwheels-dmz

  # Zone 2 – Services: business-logic layer, isolated from host
  services:
    driver: bridge
    name: uniwheels-services
    internal: true

  # Zone 3 – Data: persistence layer, no external access
  data:
    driver: bridge
    name: uniwheels-data
    internal: true

services:

  # ─────────────────────────────────────────────────────────────────────────────
  #  INFRAESTRUCTURA (bases de datos + broker)  →  DATA zone only
  # ─────────────────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: auth-db
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-loggeo_base_db}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    # No host port – reachable only within the data network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-loggeo_base_db}"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  mongo-chat:
    image: mongo:7
    container_name: chat-db
    # No host port – reachable only within the data network
    volumes:
      - mongo_chat_data:/data/db
    networks:
      - data
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    restart: unless-stopped

  mongo-notifications:
    image: mongo:7
    container_name: notifications-db
    # No host port – reachable only within the data network
    volumes:
      - mongo_notifications_data:/data/db
    networks:
      - data
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    restart: unless-stopped

  mongo-routes:
    image: mongo:7
    container_name: routes-db
    # No host port – reachable only within the data network
    volumes:
      - mongo_routes_data:/data/db
    networks:
      - data
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    restart: unless-stopped

  search-postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: route-search-postgres
    environment:
      POSTGRES_DB:       routesearch
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    # No host port – reachable only within the data network
    volumes:
      - route_search_pgdata:/var/lib/postgresql/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: event-broker
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    # No host ports – broker is internal; management UI not exposed to host
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - data
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  #  MICROSERVICIOS DE NEGOCIO  →  SERVICES zone + DATA zone
  # ─────────────────────────────────────────────────────────────────────────────

  loggueo-service:
    build:
      context: ../loggueo_service
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      DATABASE_URL:                postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-loggeo_base_db}
      SECRET_KEY:                  ${JWT_SHARED_SECRET:-dev_secret_change_me}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      ALGORITHM:                   ${JWT_ALGORITHM:-HS256}
      DEBUG:                       ${AUTH_DEBUG:-False}
      ENVIRONMENT:                 ${AUTH_ENVIRONMENT:-production}
    # No host port – reachable only within the services network (via api-gateway)
    networks:
      - services
      - data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/').getcode()==200 else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    restart: unless-stopped

  chat-service:
    build:
      context: ../chat-service
      dockerfile: Dockerfile
    container_name: chat-service
    environment:
      NODE_ENV:          production
      PORT:              3001
      MONGODB_URI:       mongodb://mongo-chat:27017/uniwheels_chat
      JWT_ACCESS_SECRET: ${JWT_SHARED_SECRET:-dev_secret_change_me}
      CORS_ORIGIN:       ${FRONTEND_URL:-http://localhost:3000}
      API_GATEWAY_URL:   http://api-gateway:8080
      RABBITMQ_URL:      amqp://admin:admin@rabbitmq:5672
    # No host port – reachable only via api-gateway on the services network
    networks:
      - services
      - data
    depends_on:
      mongo-chat:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3001/health',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    restart: unless-stopped

  notifications-service:
    build:
      context: ../notifications-service
      dockerfile: Dockerfile
    container_name: notifications-service
    environment:
      NODE_ENV:          production
      PORT:              3002
      MONGODB_URI:       mongodb://mongo-notifications:27017/uniwheels_notifications
      JWT_ACCESS_SECRET: ${JWT_SHARED_SECRET:-dev_secret_change_me}
      RABBITMQ_URL:      amqp://admin:admin@rabbitmq:5672
      CORS_ORIGIN:       ${FRONTEND_URL:-http://localhost:3000}
    # No host port – reachable only via api-gateway on the services network
    networks:
      - services
      - data
    depends_on:
      mongo-notifications:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3002/health',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  routes-reservations-service:
    build:
      context: ../routes-reservations-service
      dockerfile: Dockerfile
    container_name: routes-service
    environment:
      PORT:         4000
      MONGO_URI:    mongodb://mongo-routes:27017/routesdb
      JWT_SECRET:   ${JWT_SHARED_SECRET:-dev_secret_change_me}
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
    # No host port – reachable only via api-gateway on the services network
    networks:
      - services
      - data
    depends_on:
      mongo-routes:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/health',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  search-service:
    build:
      context: ../search-service
      dockerfile: Dockerfile
    container_name: route-search-service
    environment:
      PORT: 6000
      DATABASE_URL: postgresql://postgres:postgres@search-postgres:5432/routesearch?sslmode=disable
      ROUTES_SERVICE_URL: http://routes-reservations-service:4000
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-60}
      JWT_SECRET: ${JWT_SHARED_SECRET:-dev_secret_change_me}
    # No host port – reachable only via api-gateway on the services network
    networks:
      - services
      - data
    depends_on:
      search-postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  #  API GATEWAY  →  bridge between DMZ and SERVICES zones
  # ─────────────────────────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    environment:
      PORT:                      8080
      JWT_SECRET:                ${JWT_SHARED_SECRET:-dev_secret_change_me}
      AUTH_SERVICE_URL:          http://loggueo-service:8000
      CHAT_SERVICE_URL:          http://chat-service:3001
      ROUTES_SERVICE_URL:        http://routes-reservations-service:4000
      NOTIFICATIONS_SERVICE_URL: http://notifications-service:3002
      SEARCH_SERVICE_URL:        http://route-search-service:6000
      COOKIE_MAX_AGE:            ${COOKIE_MAX_AGE:-1800}
      FRONTEND_URL:              ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "8080:8080"
    networks:
      - dmz
      - services
    depends_on:
      loggueo-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      routes-reservations-service:
        condition: service_healthy
      notifications-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:8080/health',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  #  FRONTEND  →  DMZ zone only
  # ─────────────────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: .
      dockerfile: dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    container_name: web-app
    environment:
      PORT:     3000
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"
    networks:
      - dmz
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000',(res)=>process.exit(res.statusCode<500?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_chat_data:
  mongo_notifications_data:
  mongo_routes_data:
  rabbitmq_data:
  route_search_pgdata:
