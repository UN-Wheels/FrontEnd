name: uniwheels

# ═══════════════════════════════════════════════════════════════════════════════
#  NETWORK SEGMENTATION + WAF + REVERSE PROXY PATTERN
#
#  Six isolated zones — only the edge zone is reachable from the host.
#
#  ┌──────────────────────────────────────────────────────────────────────────┐
#  │  EDGE      (public)  waf ─:8080──┐  waf ─:8081──┐                       │
#  │  WAF-ZONE  (internal) waf ←─→ rp-web            waf ←─→ rp-mobile       │
#  │  WEB-ZONE  (internal) rp-web ←─→ frontend (Next.js SSR)                 │
#  │  GATEWAY   (internal) rp-web ←─→ api-gateway  rp-mobile ←─→ api-gateway │
#  │  SERVICES  (internal) api-gateway ←─→ microservices                     │
#  │  DATA      (internal) microservices ←─→ databases + broker               │
#  └──────────────────────────────────────────────────────────────────────────┘
#
#  Rules enforced by the topology below:
#   • ONLY the waf container has host port bindings (:8080 web, :8081 mobile).
#   • rp-web and rp-mobile are internal — reachable only from the WAF.
#   • The WAF inspects ALL traffic with ModSecurity + OWASP CRS (Paranoia 1).
#   • The frontend (SSR) and api-gateway are PRIVATE — clients never see them.
#   • Each microservice can only reach the databases it owns.
# ═══════════════════════════════════════════════════════════════════════════════

networks:

  # Zone 1 – EDGE: only zone exposed to the host (via the two reverse proxies)
  edge:
    driver: bridge
    name: uniwheels-edge

  # Zone 2 – WEB-ZONE: rp-web ↔ Next.js SSR (private)
  web-zone:
    driver: bridge
    name: uniwheels-web-zone
    internal: true

  # Zone 3 – GATEWAY-ZONE: rp-mobile + SSR ↔ api-gateway (private)
  gateway-zone:
    driver: bridge
    name: uniwheels-gateway-zone
    internal: true

  # Zone 4 – SERVICES: api-gateway ↔ microservices (private)
  services:
    driver: bridge
    name: uniwheels-services
    internal: true

  # Zone 5 – DATA: microservices ↔ databases + broker (private)
  data:
    driver: bridge
    name: uniwheels-data
    internal: true

  # Zone 6 – WAF-ZONE: waf ↔ rp-web + rp-mobile (private; replaces direct edge exposure)
  waf-zone:
    driver: bridge
    name: uniwheels-waf-zone
    internal: true

services:

  # ─────────────────────────────────────────────────────────────────────────────
  #  INFRAESTRUCTURA (bases de datos + broker)  →  DATA zone only
  # ─────────────────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: auth-db
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-loggeo_base_db}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    # No host port – reachable only within the data network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-loggeo_base_db}"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  mongo-chat:
    image: mongo:7
    container_name: chat-db
    # No host port – reachable only within the data network
    volumes:
      - mongo_chat_data:/data/db
    networks:
      - data
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    restart: unless-stopped

  mongo-notifications:
    image: mongo:7
    container_name: notifications-db
    # No host port – reachable only within the data network
    volumes:
      - mongo_notifications_data:/data/db
    networks:
      - data
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    restart: unless-stopped

  mongo-routes:
    image: mongo:7
    container_name: routes-db
    # No host port – reachable only within the data network
    volumes:
      - mongo_routes_data:/data/db
    networks:
      - data
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    restart: unless-stopped

  search-postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: route-search-postgres
    environment:
      POSTGRES_DB:       routesearch
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    # No host port – reachable only within the data network
    volumes:
      - route_search_pgdata:/var/lib/postgresql/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: event-broker
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    # No host ports – broker is internal; management UI not exposed to host
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - data
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  #  MICROSERVICIOS DE NEGOCIO  →  SERVICES zone + DATA zone
  # ─────────────────────────────────────────────────────────────────────────────

  loggueo-service:
    build:
      context: ../loggueo_service
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      DATABASE_URL:                postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-loggeo_base_db}
      SECRET_KEY:                  ${JWT_SHARED_SECRET:-dev_secret_change_me}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      ALGORITHM:                   ${JWT_ALGORITHM:-HS256}
      DEBUG:                       ${AUTH_DEBUG:-False}
      ENVIRONMENT:                 ${AUTH_ENVIRONMENT:-production}
    # No host port – reachable only via api-gateway on the services network
    networks:
      - services
      - data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/').getcode()==200 else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    restart: unless-stopped

  chat-service:
    build:
      context: ../chat-service
      dockerfile: Dockerfile
    container_name: chat-service
    environment:
      NODE_ENV:          production
      PORT:              3001
      MONGODB_URI:       mongodb://mongo-chat:27017/uniwheels_chat
      JWT_ACCESS_SECRET: ${JWT_SHARED_SECRET:-dev_secret_change_me}
      CORS_ORIGIN:       ${FRONTEND_URL:-http://localhost:8080}
      API_GATEWAY_URL:   http://api-gateway:8080
      RABBITMQ_URL:      amqp://admin:admin@rabbitmq:5672
    # No host port – reachable only via api-gateway on the services network
    networks:
      - services
      - data
    depends_on:
      mongo-chat:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3001/health',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    restart: unless-stopped

  notifications-service:
    build:
      context: ../notifications-service
      dockerfile: Dockerfile
    container_name: notifications-service
    environment:
      NODE_ENV:          production
      PORT:              3002
      MONGODB_URI:       mongodb://mongo-notifications:27017/uniwheels_notifications
      JWT_ACCESS_SECRET: ${JWT_SHARED_SECRET:-dev_secret_change_me}
      RABBITMQ_URL:      amqp://admin:admin@rabbitmq:5672
      CORS_ORIGIN:       ${FRONTEND_URL:-http://localhost:8080}
    # No host port – reachable only via api-gateway on the services network
    networks:
      - services
      - data
    depends_on:
      mongo-notifications:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3002/health',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  routes-reservations-service:
    build:
      context: ../routes-reservations-service
      dockerfile: Dockerfile
    container_name: routes-service
    environment:
      PORT:         4000
      MONGO_URI:    mongodb://mongo-routes:27017/routesdb
      JWT_SECRET:   ${JWT_SHARED_SECRET:-dev_secret_change_me}
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
    # No host port – reachable only via api-gateway on the services network
    networks:
      - services
      - data
    depends_on:
      mongo-routes:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4000/health',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  search-service:
    build:
      context: ../search-service
      dockerfile: Dockerfile
    container_name: route-search-service
    environment:
      PORT: 6000
      DATABASE_URL: postgresql://postgres:postgres@search-postgres:5432/routesearch?sslmode=disable
      ROUTES_SERVICE_URL: http://routes-reservations-service:4000
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-60}
      JWT_SECRET: ${JWT_SHARED_SECRET:-dev_secret_change_me}
    # No host port – reachable only via api-gateway on the services network
    networks:
      - services
      - data
    depends_on:
      search-postgres:
        condition: service_healthy
      routes-reservations-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:6000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  #  API GATEWAY  →  GATEWAY-ZONE + SERVICES (private — no host port)
  # ─────────────────────────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    environment:
      PORT:                      8080
      JWT_SECRET:                ${JWT_SHARED_SECRET:-dev_secret_change_me}
      AUTH_SERVICE_URL:          http://loggueo-service:8000
      CHAT_SERVICE_URL:          http://chat-service:3001
      ROUTES_SERVICE_URL:        http://routes-reservations-service:4000
      NOTIFICATIONS_SERVICE_URL: http://notifications-service:3002
      SEARCH_SERVICE_URL:        http://route-search-service:6000
      COOKIE_MAX_AGE:            ${COOKIE_MAX_AGE:-1800}
      FRONTEND_URL:              ${FRONTEND_URL:-http://localhost:8080}
    # No host port – reachable only via rp-mobile (mobile) or SSR (web), both
    # connected to the gateway-zone network.
    networks:
      - gateway-zone
      - services
    depends_on:
      loggueo-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      routes-reservations-service:
        condition: service_healthy
      notifications-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:8080/health',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  #  FRONTEND (Next.js SSR)  →  WEB-ZONE + GATEWAY-ZONE (private — no host port)
  # ─────────────────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: .
      dockerfile: dockerfile
      args:
        # Public URL of the rp-web reverse proxy (what the browser sees).
        # The browser hits http://localhost:8080/ → rp-web → frontend SSR.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        # Internal URL the SSR rewrites use to reach the API Gateway.
        # MUST be a build arg because next.config.ts evaluates rewrites() at build time.
        INTERNAL_GATEWAY_URL: http://api-gateway:8080
    container_name: web-app
    environment:
      PORT:     3000
      HOSTNAME: 0.0.0.0
      INTERNAL_GATEWAY_URL: http://api-gateway:8080
    # No host port – reachable only via rp-web on the web-zone network.
    networks:
      - web-zone
      - gateway-zone
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000',(res)=>process.exit(res.statusCode<500?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  #  REVERSE PROXIES  →  EDGE zone (the only public components)
  # ─────────────────────────────────────────────────────────────────────────────

  rp-web:
    image: nginx:1.27-alpine
    container_name: rp-web
    # No host ports — rp-web is now internal, reachable only from the WAF
    volumes:
      - ../security/reverse-proxies/rp-web/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - waf-zone   # WAF → rp-web
      - web-zone   # rp-web → frontend SSR
      # gateway-zone needed for WebSocket bypass (Socket.io chat/notifications)
      # which goes from rp-web direct to api-gateway, skipping Next.js SSR.
      - gateway-zone
    depends_on:
      frontend:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  rp-mobile:
    image: nginx:1.27-alpine
    container_name: rp-mobile
    # No host ports — rp-mobile is now internal, reachable only from the WAF
    volumes:
      - ../security/reverse-proxies/rp-mobile/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - waf-zone     # WAF → rp-mobile
      - gateway-zone # rp-mobile → api-gateway
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  #  WAF (ModSecurity + OWASP CRS)  →  EDGE zone (public) + WAF-ZONE (private)
  #  The ONLY component with host port bindings after this change.
  #  Inspects all inbound traffic before it reaches rp-web or rp-mobile.
  # ─────────────────────────────────────────────────────────────────────────────

  waf:
    image: owasp/modsecurity-crs:nginx
    container_name: waf
    ports:
      - "8080:8080"   # Web channel  → rp-web  (browser traffic)
      - "8081:8081"   # Mobile channel → rp-mobile (Flutter app traffic)
    volumes:
      # Custom nginx server blocks (two upstreams: rp-web and rp-mobile)
      - ../WAF/nginx.conf:/etc/nginx/templates/conf.d/default.conf.template:ro
      # ModSecurity include chain (preserves env-var-driven base config)
      - ../WAF/modsecurity.conf:/etc/nginx/conf/modsecurity.conf:ro
      # CRS setup — requires MANUAL_MODE=1 below
      - ../WAF/crs-setup.conf:/etc/modsecurity.d/owasp-crs/crs-setup.conf:ro
      # UN-Wheels domain exclusions
      - ../WAF/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:/etc/modsecurity.d/owasp-crs/rules/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:ro
      - ../WAF/RESPONSE-999-EXCLUSION-RULES-AFTER-CRS.conf:/etc/modsecurity.d/owasp-crs/rules/RESPONSE-999-EXCLUSION-RULES-AFTER-CRS.conf:ro
    environment:
      # ── ModSecurity engine ─────────────────────────────────────────────────
      MODSEC_RULE_ENGINE:       "On"            # Blocking mode (NOT DetectionOnly)
      MODSEC_REQ_BODY_ACCESS:   "On"            # Inspect request bodies
      MODSEC_RESP_BODY_ACCESS:  "Off"           # Skip response body scan (performance)
      MODSEC_REQ_BODY_LIMIT:    "10485760"      # 10 MB — allows avatar uploads
      MODSEC_AUDIT_ENGINE:      "RelevantOnly"  # Log only blocked/flagged requests
      MODSEC_AUDIT_LOG_FORMAT:  "JSON"          # Structured audit log
      MODSEC_AUDIT_LOG:         "/dev/stdout"   # Stream to Docker logs
      # ── CRS tuning (reflected in auto-generated modsecurity.conf) ──────────
      # NOTE: BLOCKING_PARANOIA / DETECTION_PARANOIA are overridden by our
      # crs-setup.conf (MANUAL_MODE=1).  Listed here for documentation only.
      BLOCKING_PARANOIA:        "1"
      DETECTION_PARANOIA:       "1"
      ANOMALY_INBOUND:          "5"
      ANOMALY_OUTBOUND:         "4"
      # ── Manual CRS setup (we provide crs-setup.conf via volume) ────────────
      MANUAL_MODE:              "1"
      # ── Allowed content (belt-and-suspenders alongside crs-setup.conf) ─────
      ALLOWED_METHODS:          "GET HEAD POST PUT PATCH DELETE OPTIONS"
      ALLOWED_REQUEST_CONTENT_TYPE: "application/json|application/x-www-form-urlencoded|multipart/form-data|multipart/related|text/plain"
      # ── Nginx tuning ────────────────────────────────────────────────────────
      PORT:                     "8080"          # Primary listen port (web channel)
      SERVER_TOKENS:            "off"
      # Real-IP passthrough: trust the WAF's own address as source of X-Forwarded-For
      SET_REAL_IP_FROM:         "172.16.0.0/12" # Docker bridge subnet range
      REAL_IP_HEADER:           "X-Forwarded-For"
    networks:
      - edge      # Public: receives host traffic on :8080 and :8081
      - waf-zone  # Private: forwards to rp-web and rp-mobile
    depends_on:
      rp-web:
        condition: service_healthy
      rp-mobile:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_chat_data:
  mongo_notifications_data:
  mongo_routes_data:
  rabbitmq_data:
  route_search_pgdata:
