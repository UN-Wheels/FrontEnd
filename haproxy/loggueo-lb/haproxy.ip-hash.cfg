global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 10s
    timeout client  60s
    timeout server  60s

frontend auth_frontend
    bind *:8000

    acl is_healthz path /healthz
    http-request return status 200 content-type "application/json" string '{"status":"ok","service":"loggueo-lb"}' if is_healthz

    default_backend auth_pool

backend auth_pool
    balance source
    option httpchk
    http-check send meth GET uri /readyz ver HTTP/1.1 hdr Host loggueo-service
    http-check expect status 200
    server loggueo_1 loggueo_1:8000 check inter 5s fall 3 rise 2
    server loggueo_2 loggueo_2:8000 check inter 5s fall 3 rise 2
    server loggueo_3 loggueo_3:8000 check inter 5s fall 3 rise 2
